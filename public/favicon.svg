<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Monitor body -->
  <rect x="96" y="130" width="320" height="210" rx="16" ry="16" fill="white" opacity="0.15"/>
  <rect x="108" y="142" width="296" height="186" rx="10" ry="10" fill="white" opacity="0.95"/>

  <!-- Screen content - circuit lines -->
  <line x1="140" y1="185" x2="230" y2="185" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="210" x2="270" y2="210" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="235" x2="250" y2="235" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>
  <line x1="140" y1="260" x2="200" y2="260" stroke="#4F46E5" stroke-width="8" stroke-linecap="round"/>

  <!-- Bar chart on right -->
  <rect x="285" y="240" width="28" height="48" rx="4" fill="#4F46E5" opacity="0.7"/>
  <rect x="320" y="215" width="28" height="73" rx="4" fill="#4F46E5" opacity="0.9"/>
  <rect x="355" y="228" width="28" height="60" rx="4" fill="#4F46E5" opacity="0.8"/>

  <!-- Monitor stand -->
  <rect x="236" y="340" width="40" height="36" rx="4" fill="white" opacity="0.9"/>
  <rect x="186" y="372" width="140" height="14" rx="7" fill="white" opacity="0.9"/>

  <!-- Bintang kecil / dot decorations -->
  <circle cx="420" cy="100" r="12" fill="white" opacity="0.3"/>
  <circle cx="90" cy="410" r="8" fill="white" opacity="0.2"/>
  <circle cx="440" cy="390" r="6" fill="white" opacity="0.25"/>
</svg>
